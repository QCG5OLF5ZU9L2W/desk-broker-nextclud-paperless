issuer: REWE DE receipt
keywords:
  - Rewe Markt
  - REWE
  - PAYBACK
fields:
  amount:
    - 'EUR\s+([0-9]+,[0-9]{2})'
    - 'EC-Cash\s+EUR\s+([0-9]+,[0-9]{2})'
  date:
    - '([0-9]{2}\.[0-9]{2}\.[0-9]{4})\s+[0-9]{2}:[0-9]{2}'
    - 'Bon\s+Nr\.?\s+[0-9]+\s+([0-9]{2}\.[0-9]{2}\.[0-9]{4})'
  invoice_number:
    - 'Bon\s+Nr\.?\s+([0-9]+)'
    - 'TA-Nr\.\s*([0-9]+)'
  payment_method:
    - '(girocard|EC-Cash|Kartenzahlung|Visa|Mastercard|Barzahlung)'
  vat_id:
    - 'UID Nr\.:\s*(DE[0-9]+)'
options:
  currency: EUR
  decimal_separator: ','
  date_formats:
    - '%d.%m.%Y'
