issuer: Ihr Punkt Konsumbedarf receipt
keywords:
  - Ihr Punkt Handelsgesellschaft
  - Konsumbedarf
  - Rechnungs Nr.
fields:
  amount:
    - 'SUMME\s+€\s*([0-9]+,[0-9]{2})'
    - '€\s*([0-9]+,[0-9]{2})\s*$'
  date:
    - 'Datum und Zeit:\s*([0-9]{2}\.[0-9]{2}\.[0-9]{4})'
    - '([0-9]{2}\.[0-9]{2}\.[0-9]{4})\s+[0-9]{2}:[0-9]{2}:[0-9]{2}'
  invoice_number:
    - 'Rechnungs Nr\.\s*([0-9]+)'
    - 'Transaktion:\s*([0-9]+)'
  vat_id:
    - 'Steuernummer:\s*([0-9/ ]+)'
options:
  currency: EUR
  decimal_separator: ','
  date_formats:
    - '%d.%m.%Y'
