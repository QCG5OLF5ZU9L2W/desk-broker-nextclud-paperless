issuer: Lidl DE receipt
keywords:
  - Lidl
  - K-U-N-D-E-N-B-E-L-E-G
  - UST-ID-NR
fields:
  amount:
    - 'zu zahlen\s+([0-9]+,[0-9]{2})'
    - 'Betrag\s+([0-9]+,[0-9]{2})\s+EUR'
  date:
    - '([0-9]{2}\.[0-9]{2}\.[0-9]{4})\s+[0-9]{2}:[0-9]{2}'
    - 'Datum\s+([0-9]{2}\.[0-9]{2}\.[0-9]{2,4})'
  invoice_number:
    - 'Beleg-Nr\.\s*([0-9]+)'
    - 'TSE Transaktionsnummer:\s*([0-9]+)'
  payment_method:
    - '(Kreditkarte|Kartenzahlung|Visa|Mastercard|girocard|Barzahlung)'
  vat_id:
    - 'UST-ID-NR:\s*(DE[0-9 ]{9,})'
options:
  currency: EUR
  decimal_separator: ','
  date_formats:
    - '%d.%m.%Y'
    - '%d.%m.%y'
