issuer: ALDI DE receipt
keywords:
  - ALDI
  - Aldi SE & Co. KG
  - K-U-N-D-E-N-B-E-L-E-G
fields:
  amount:
    - 'ZAHLEN\s+(?:EURO\s+)?([0-9]+,[0-9]{2})\s*€?'
    - 'EUR\s+([0-9]+,[0-9]{2})'
  date:
    - '([0-9]{2}/[0-9]{2}/[0-9]{4})\s+[0-9]{2}:[0-9]{2}'
    - '([0-9]{2}\.[0-9]{2}\.[0-9]{2,4})\s+[0-9]{2}:[0-9]{2}'
  invoice_number:
    - 'Transaktionsnummer:\s*([0-9]+)'
    - '([0-9]{3,}\s+[0-9]{6}\s+[0-9]{4}\s+[0-9]{2}/[0-9]{2}/[0-9]{4}\s+[0-9]{2}:[0-9]{2}:[0-9]{2})'
  payment_method:
    - '(girocard|Kartenzahlung|Barzahlung|Bargeld)'
  vat_id:
    - 'USt\.\s*ID:\s*(DE\s*[0-9 ]+)'
options:
  currency: EUR
  decimal_separator: ','
  date_formats:
    - '%d/%m/%Y'
    - '%d.%m.%Y'
    - '%d.%m.%y'
