issuer: Rossmann DE receipt
keywords:
  - ROSSMANN
  - Dirk Rossmann GmbH
  - rossmann.de
fields:
  amount:
    - 'Total\s+€\s*([0-9]+,[0-9]{2})'
    - 'Betrag\s+([0-9]+,[0-9]{2})\s+EUR'
  date:
    - '([0-9]{2}\.[0-9]{2}\.[0-9]{4})\s+[0-9]{2}:[0-9]{2}'
    - '([0-9]{4}-[0-9]{2}-[0-9]{2})T[0-9:]+'
  invoice_number:
    - 'Beleg-Nr\.\s*([0-9]+)'
    - 'Transaktion:\s*([0-9]+)'
  payment_method:
    - '(girocard|Kartenzahlung|Visa|Mastercard|Barzahlung)'
  vat_id:
    - 'UnSt-ID\.Nr\.DE\s*([0-9 ]+)'
options:
  currency: EUR
  decimal_separator: ','
  date_formats:
    - '%d.%m.%Y'
    - '%Y-%m-%d'
