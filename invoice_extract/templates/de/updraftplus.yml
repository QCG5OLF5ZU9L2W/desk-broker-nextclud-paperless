issuer: UpdraftPlus

keywords:
  - UpdraftPlus
  - INVOICE + PAYMENT CONFIRMATION
  - Order Number

fields:
  amount: '€\s*([0-9]+[.,][0-9]{2})'
  date: 'Invoice Date:[^\r\n]*?([A-Za-z]+ [0-9]{1,2}, [0-9]{4})'
  invoice_number: 'Order Number:[^\r\n]*?([0-9]+)'
  order_date: 'Order Date:[^\r\n]*?([A-Za-z]+ [0-9]{1,2}, [0-9]{4})'
  payment_method: 'Payment Method:[^\r\n]*?([A-Za-z0-9 -]+)'

options:
  currency: EUR
  decimal_separator: '.'
  date_formats:
    - '%B %d, %Y'
