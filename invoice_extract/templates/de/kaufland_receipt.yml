issuer: Kaufland DE receipt
keywords:
  - Kaufland
  - Kaufland Hohen Neuendorf
  - K-U-N-D-E-N-B-E-L-E-G
fields:
  amount:
    - 'Summe\s+([0-9]+,[0-9]{2})'
    - 'EUR\s+([0-9]+,[0-9]{2})'
  date:
    - 'Datum\s+([0-9]{2}\.[0-9]{2}\.[0-9]{2})'
    - '([0-9]{2}\.[0-9]{2}\.[0-9]{2})\s+[0-9]{2}:[0-9]{2}'
  invoice_number:
    - 'Bon:\s*([0-9]+)'
    - 'Transaktionsnummer:\s*([0-9]+)'
  payment_method:
    - '(Kartenzahlung|Visa|Mastercard|girocard|Barzahlung)'
  vat_id:
    - '(DE[0-9]{9})'
options:
  currency: EUR
  decimal_separator: ','
  date_formats:
    - '%d.%m.%y'
