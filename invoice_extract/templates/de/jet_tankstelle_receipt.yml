issuer: JET Tankstelle DE receipt
keywords:
  - JET
  - Tankstelle
  - K-U-N-D-E-N-B-E-L-E-G
fields:
  amount:
    - 'Summe\s+EUR\s+([0-9]+,[0-9]{2})'
    - 'EUR\s+([0-9]+,[0-9]{2})'
  date:
    - 'Datum\s+([0-9]{2}\.[0-9]{2}\.[0-9]{2})'
    - '([0-9]{2}\.[0-9]{2}\.[0-9]{2})\s+[0-9]{2}:[0-9]{2}'
  invoice_number:
    - 'Bon\s+([0-9]+)'
    - 'Transaktionsnummer:\s*([0-9]+)'
  payment_method:
    - '(Visa|Mastercard|DKB|Kartenzahlung|girocard|Barzahlung)'
  vat_id:
    - 'Ust-IdNr\.\s*(DE[0-9]+)'
options:
  currency: EUR
  decimal_separator: ','
  date_formats:
    - '%d.%m.%y'
